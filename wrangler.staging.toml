# Staging preview — serves the current working tree at a workers.dev URL and
# handles /api/contact. Production (layer-nine.ai) is untouched by this.
# Deploy: npx wrangler deploy --config wrangler.staging.toml
name = "layer-nine-staging"
main = "staging-worker.js"
compatibility_date = "2026-07-13"
account_id = "be1f1dba7f58cbd463c4d3c0a5ca144c"
workers_dev = true

[assets]
directory = "."
binding = "ASSETS"
html_handling = "auto-trailing-slash"
